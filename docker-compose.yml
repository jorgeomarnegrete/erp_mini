version: '3.8'

services:
  db:
    image: postgres:15
    container_name: factu_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: IntiMayu
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: factu_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://admin:IntiMayu@db/appdb
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: factu_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
